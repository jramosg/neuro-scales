worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;

    # HTTP — only serve ACME challenges, redirect everything else to HTTPS
    server {
        listen 80;
        server_name scales.trukun.com www.scales.trukun.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://scales.trukun.com$request_uri;
        }
    }

    # Redirect www → bare domain (HTTPS)
    server {
        listen 443 ssl;
        server_name www.scales.trukun.com;

        ssl_certificate     /etc/letsencrypt/live/scales.trukun.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/scales.trukun.com/privkey.pem;

        return 301 https://scales.trukun.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name scales.trukun.com;

        ssl_certificate     /etc/letsencrypt/live/scales.trukun.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/scales.trukun.com/privkey.pem;

        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        root /usr/share/nginx/html;
        index index.html;

        # Astro hashed assets — cache forever
        location ^~ /_astro/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Other static assets
        location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|pdf|mp4|webm)$ {
            expires 7d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # Redirect root → default locale (permanent, passes link equity)
        location = / {
            return 301 /es/;
        }

        # Pages — try file, then directory index, then 404
        location / {
            try_files $uri $uri/ $uri.html =404;
        }
    }
}
