<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#238686"/>
      <stop offset="100%" stop-color="#1d7070"/>
    </linearGradient>
  </defs>

  <!-- Gauge arc -->
  <path d="M5 21 A11.5 11.5 0 0 1 27 21" stroke="url(#fg)" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Tick marks -->
  <line x1="6.5" y1="18.5" x2="8.5" y2="19.5" stroke="#1d7070" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="13" x2="10.5" y2="14.5" stroke="#1d7070" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15" y1="10" x2="15.5" y2="11.8" stroke="#1d7070" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="21.5" y1="13" x2="20" y2="14.5" stroke="#1d7070" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="25.5" y1="18.5" x2="23.5" y2="19.5" stroke="#1d7070" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Needle -->
  <line x1="16" y1="20.5" x2="10.5" y2="14" stroke="#a8682a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="20.5" r="2" fill="#a8682a"/>

  <!-- Brain outline (simplified) -->
  <path d="M16 5 C11 5 7.5 8.5 7 12.5" stroke="#1d7070" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M16 5 C21 5 24.5 8.5 25 12.5" stroke="#1d7070" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <!-- Central fold -->
  <path d="M16 6 C14.5 9 13.5 12 13 15" stroke="#1d7070" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M16 6 C17.5 9 18.5 12 19 15" stroke="#1d7070" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Synapse dots -->
  <circle cx="13" cy="15" r="1" fill="#a8682a" opacity="0.7"/>
  <circle cx="19" cy="15" r="1" fill="#a8682a" opacity="0.7"/>
  <circle cx="16" cy="6" r="1.2" fill="#1d7070"/>

  <style>
    @media (prefers-color-scheme: dark) {
      line[stroke="#1d7070"] { stroke: #3cb0b0; }
      path[stroke="#1d7070"] { stroke: #3cb0b0; }
      path[stroke="url(#fg)"] { stroke: #3cb0b0; }
      circle[fill="#1d7070"] { fill: #3cb0b0; }
      circle[fill="#a8682a"] { fill: #d4913a; }
      line[stroke="#a8682a"] { stroke: #d4913a; }
    }
  </style>
</svg>
