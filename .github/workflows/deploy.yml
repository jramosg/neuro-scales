name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: 'docker-compose.prod.yml'
          target: '~/neuro-scales'

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          APP_PORT: ${{ secrets.APP_PORT }}
          REPO_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,IMAGE,APP_PORT,REPO_NAME
          script: |
            set -e
            cd ~/neuro-scales

            echo "Logging in to GitHub Container Registry..."
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            echo "Pulling latest image..."
            docker compose -f docker-compose.prod.yml pull

            echo "Restarting service..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            echo "Cleaning up old images..."
            docker images "ghcr.io/$REPO_NAME" --filter "dangling=true" -q | xargs -r docker rmi -f || true
            docker images "ghcr.io/$REPO_NAME" -q | tail -n +2 | xargs -r docker rmi -f 2>/dev/null || true

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read

    steps:
      - name: Health check
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          APP_PORT: ${{ secrets.APP_PORT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: IMAGE,APP_PORT
          script: |
            set -e
            cd ~/neuro-scales

            max_attempts=12
            attempt=1

            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt/$max_attempts - checking service..."

              if docker compose -f docker-compose.prod.yml ps | grep -q "Up"; then
                if curl -f -s -m 5 "http://localhost:${APP_PORT}/" >/dev/null 2>&1; then
                  echo "Application is responding!"
                  exit 0
                fi
              fi

              if [ $attempt -eq $max_attempts ]; then
                echo "Health check failed after $max_attempts attempts"
                echo ""
                echo "Container status:"
                docker compose -f docker-compose.prod.yml ps
                echo ""
                echo "Logs:"
                docker compose -f docker-compose.prod.yml logs --tail=30
                exit 1
              fi

              echo "Waiting 5 seconds before retry..."
              sleep 5
              attempt=$((attempt + 1))
            done
